services:
  api:
    image: ${IMAGE:-ghcr.io/pinnguyen9x/json-server-blog:latest}
    container_name: json-server-blog
    restart: unless-stopped
    # KHÔNG publish port ra host — chỉ truy cập nội bộ qua network webnet (ẩn khỏi internet)
    expose:
      - "4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    # Giữ dữ liệu db.json trên host để không mất khi redeploy (json-server ghi runtime)
    volumes:
      - ./db.json:/app/db.json
    networks:
      - webnet
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4000/api/posts?_limit=1"]
      interval: 30s
      timeout: 5s
      retries: 3

# Network dùng chung với frontend (tạo sẵn bằng: docker network create webnet)
networks:
  webnet:
    external: true
